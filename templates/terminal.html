<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - Stock Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .back-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #30363d;
            border-color: #8b949e;
        }

        .app-info {
            flex: 1;
        }

        .app-info .app-name {
            font-size: 15px;
            font-weight: 600;
            color: #e6edf3;
            font-family: -apple-system, sans-serif;
        }

        .app-info .app-desc {
            font-size: 12px;
            color: #8b949e;
            margin-top: 2px;
        }

        .status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: #21262d;
            color: #8b949e;
        }

        .status.running {
            background: #0d4429;
            color: #3fb950;
        }

        .terminal-wrapper {
            flex: 1;
            overflow: hidden;
            padding: 12px;
        }

        #terminal {
            height: 100%;
            background: #0d1117;
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #terminal::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        #terminal::-webkit-scrollbar-track {
            background: #161b22;
        }

        #terminal::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        .actions {
            padding: 8px 20px;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .action-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: -apple-system, sans-serif;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #30363d;
        }

        .action-btn.danger {
            border-color: #f85149;
            color: #f85149;
        }

        .action-btn.danger:hover {
            background: #f8514922;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="back-btn">← 返回</a>
        <div class="app-info">
            <div class="app-name">{{ app_name }}</div>
            <div class="app-desc">{{ app_desc }}</div>
        </div>
        <div class="status" id="status">正在连接...</div>
    </div>

    <div class="terminal-wrapper">
        <div id="terminal"></div>
    </div>

    <div class="actions">
        <button class="action-btn" onclick="clearTerm()">清屏</button>
        <button class="action-btn danger" onclick="restartApp()">重启</button>
    </div>

    <script>
        const appId = "{{ app_id }}";
        const termEl = document.getElementById("terminal");
        const statusEl = document.getElementById("status");
        let eventSource = null;

        // ANSI 颜色映射
        const colorMap = {
            "\033[91m": "color:#ff7b72",
            "\033[92m": "color:#3fb950",
            "\033[93m": "color:#d29922",
            "\033[94m": "color:#58a6ff",
            "\033[95m": "color:#bc8cff",
            "\033[96m": "color:#39c5cf",
            "\033[97m": "color:#ffffff",
            "\033[1m": "font-weight:bold",
            "\033[0m": "",
            "\033[0;91m": "color:#ff7b72",
            "\033[0;92m": "color:#3fb950",
            "\033[0;93m": "color:#d29922",
            "\033[0;94m": "color:#58a6ff",
            "\033[0;95m": "color:#bc8cff",
            "\033[0;96m": "color:#39c5cf",
            "\033[0;97m": "color:#ffffff",
            "\033[1;91m": "font-weight:bold;color:#ff7b72",
            "\033[1;92m": "font-weight:bold;color:#3fb950",
            "\033[1;93m": "font-weight:bold;color:#d29922",
            "\033[1;94m": "font-weight:bold;color:#58a6ff",
            "\033[1;95m": "font-weight:bold;color:#bc8cff",
            "\033[1;96m": "font-weight:bold;color:#39c5cf",
            "\033[1;97m": "font-weight:bold;color:#ffffff",
            "\033[2m": "opacity:0.7",
            "\033[90m": "color:#8b949e",
            "\033[0;90m": "color:#8b949e",
        };

        function parseANSI(text) {
            // 跳过 SSI 标记直接返回原始文本（程序已经是纯文本输出）
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function appendOutput(text) {
            const div = document.createElement("span");
            div.innerHTML = parseANSI(text);
            termEl.appendChild(div);
            termEl.scrollTop = termEl.scrollHeight;
        }

        function clearTerm() {
            termEl.innerHTML = "";
        }

        function restartApp() {
            if (eventSource) {
                eventSource.close();
            }
            clearTerm();
            connect();
        }

        function connect() {
            statusEl.textContent = "正在连接...";
            statusEl.className = "status";

            // 使用 SSE（Server-Sent Events）- HTTP 长连接，Railway 完美支持
            eventSource = new EventSource("/stream/" + appId);

            eventSource.onopen = function() {
                statusEl.textContent = "● 运行中";
                statusEl.className = "status running";
            };

            eventSource.onmessage = function(event) {
                // SSE 的 data 字段已解码换行符
                if (event.data) {
                    appendOutput(event.data);
                }
            };

            eventSource.onerror = function() {
                statusEl.textContent = "已断开";
                statusEl.className = "status";
                eventSource.close();
                appendOutput("\n\n[连接已断开，请点击「重启」重新运行]\n");
            };
        }

        // 启动连接
        connect();
    </script>
</body>
</html>
