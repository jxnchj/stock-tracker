<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_info.name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #0b1020 0%, #131b31 100%);
            color: #eef4ff;
            min-height: 100vh;
        }
        .wrap { max-width: 1180px; margin: 0 auto; padding: 24px 20px 48px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; }
        .back {
            color: #dbe7ff; text-decoration: none; background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.12); border-radius: 12px; padding: 10px 14px;
        }
        .badge {
            font-size: 12px; padding: 8px 12px; border-radius: 999px; font-weight: 700;
            background: rgba(41,210,180,.14); color: #7df0d8; border: 1px solid rgba(41,210,180,.35);
        }
        .hero {
            background: rgba(13, 19, 36, .9); border: 1px solid rgba(255,255,255,.08); border-radius: 24px;
            padding: 24px; margin-bottom: 18px; box-shadow: 0 15px 40px rgba(0,0,0,.24);
        }
        .hero h1 { font-size: 32px; margin-bottom: 10px; }
        .hero p { color: #b7c4da; line-height: 1.8; }
        .layout { display: grid; grid-template-columns: 360px 1fr; gap: 18px; }
        .panel {
            background: rgba(13, 19, 36, .92); border: 1px solid rgba(255,255,255,.08); border-radius: 24px;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.18);
        }
        .panel h2 { font-size: 18px; margin-bottom: 12px; }
        .help { color: #b7c4da; line-height: 1.8; font-size: 14px; }
        .example {
            margin-top: 14px; background: #09111f; border: 1px solid rgba(255,255,255,.08); border-radius: 16px;
            padding: 14px; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px;
            color: #d4e1ff;
        }
        textarea {
            width: 100%; min-height: 220px; resize: vertical; border-radius: 16px; border: 1px solid rgba(255,255,255,.12);
            background: #09111f; color: #eff4ff; padding: 16px; font-size: 14px; line-height: 1.7;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        .actions { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }
        button {
            border: none; border-radius: 14px; padding: 12px 16px; cursor: pointer; font-weight: 700;
        }
        .primary { background: linear-gradient(135deg, #6b8bff, #4fd0b7); color: #07101d; }
        .secondary { background: rgba(255,255,255,.08); color: #eff4ff; border: 1px solid rgba(255,255,255,.1); }
        .output {
            margin-top: 16px; min-height: 360px; background: #07101d; border: 1px solid rgba(255,255,255,.08); border-radius: 18px;
            padding: 18px; white-space: pre-wrap; line-height: 1.7; font-size: 14px; overflow: auto;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: #e4ecff;
        }
        .hint { color: #8ea2c4; font-size: 13px; margin-top: 12px; line-height: 1.7; }
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <a class="back" href="/">← 返回首页</a>
            <span class="badge">{{ app_info.badge }}</span>
        </div>

        <section class="hero">
            <h1>{{ app_info.name }}</h1>
            <p>{{ app_info.desc }}</p>
        </section>

        <div class="layout">
            <section class="panel">
                <h2>怎么玩</h2>
                <div class="help">{{ app_info.input_help }}</div>
                <div class="example" id="exampleText">{{ app_info.example_input }}</div>
                <div class="hint">说明：这里不是假终端。你输入什么，后端就真的拿去执行脚本，再把真实输出返回。</div>
            </section>

            <section class="panel">
                <h2>输入区</h2>
                <textarea id="userInput" placeholder="把输入按行写在这里...">{{ app_info.example_input }}</textarea>
                <div class="actions">
                    <button class="primary" id="runBtn">运行</button>
                    <button class="secondary" id="fillBtn">填入示例</button>
                    <button class="secondary" id="clearBtn">清空输入</button>
                </div>
                <div class="output" id="output">点“运行”后，这里会显示脚本真实输出。</div>
            </section>
        </div>
    </div>

    <script>
        const runBtn = document.getElementById('runBtn');
        const fillBtn = document.getElementById('fillBtn');
        const clearBtn = document.getElementById('clearBtn');
        const userInput = document.getElementById('userInput');
        const output = document.getElementById('output');
        const example = document.getElementById('exampleText').textContent;
        const appId = '{{ app_id }}';

        fillBtn.addEventListener('click', () => { userInput.value = example; });
        clearBtn.addEventListener('click', () => { userInput.value = ''; });

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            runBtn.textContent = '运行中...';
            output.textContent = '正在执行，请稍等...';
            try {
                const res = await fetch(`/run/${appId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_input: userInput.value })
                });
                const data = await res.json();
                output.textContent = data.ok ? data.output : `运行失败\n\n${data.error || data.output || '未知错误'}`;
            } catch (err) {
                output.textContent = `请求失败\n\n${err}`;
            } finally {
                runBtn.disabled = false;
                runBtn.textContent = '运行';
            }
        });
    </script>
</body>
</html>
